name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "grm-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: lauriebart/grm

jobs:
  publish:
    name: Build, verify, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build smoke-test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: grm:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test service startup
        run: |
          trap 'docker logs grm-smoke || true; docker rm --force grm-smoke >/dev/null 2>&1 || true' EXIT
          docker run --detach --name grm-smoke grm:smoke
          sleep 3
          docker inspect --format='{{.State.Running}}' grm-smoke | grep '^true$'

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=grm-v(.*),group=1
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=GRM local workspace service
            org.opencontainers.image.description=Typed GRM gRPC workspace service

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: mode=max
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
