name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test-and-examples:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Build CLI binary
        run: cargo build --bin grm

      - name: Validate persistence example
        run: cargo test --example persistence --no-run

      - name: Run CLI script example
        run: cargo run --example cli_script

  python-bindings:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Python build and type-check tools
        run: python -m pip install maturin "mypy>=1.10,<2"

      - name: Build Python wheel
        run: maturin build --manifest-path grm-python/Cargo.toml --out dist

      - name: Install Python wheel
        run: python -m pip install dist/*.whl

      - name: Run Python bindings smoke test
        run: python tests/python_bindings_smoke.py

      - name: Run Python static typing checks
        run: python tests/python_typing_check.py

  package-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate proc-macro package
        run: cargo package -p grm-rs-macros --no-verify
