name: Python Wheels

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a draft GitHub prerelease with the built artifacts"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag to use when publish_release is enabled"
        required: true
        type: string
        default: "grm-python-v0.1.0a7"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: python -m pip install maturin

      - name: Build wheel
        run: maturin build --manifest-path grm-python/Cargo.toml --release --out dist

      - name: Build source distribution
        if: runner.os == 'Linux'
        run: maturin sdist --manifest-path grm-python/Cargo.toml --out dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grm-rs-python-${{ runner.os }}
          path: dist/*

  release:
    name: Draft prerelease
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.publish_release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --draft \
              --prerelease \
              --title "$RELEASE_TAG" \
              --notes "Pre-release Python wheels for grm-rs."
          fi
